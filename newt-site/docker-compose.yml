# Standalone newt for a homelab/site host (NOT the hub). Runs in Docker, dials
# the remote Pangolin, and self-registers using a one-time provisioning key —
# no per-site id/secret to copy by hand. Brought up with:
#   cp .env.example .env && docker compose up -d
#
# On first boot newt exchanges NEWT_PROVISIONING_KEY for a permanent id+secret,
# persists them to ./newt-data/newt.json, and ignores the key thereafter.
services:
  newt:
    image: ${NEWT_IMAGE:-docker.io/fosrl/newt:1.5.0}
    container_name: newt
    restart: unless-stopped
    environment:
      PANGOLIN_ENDPOINT: "${PANGOLIN_ENDPOINT}"
      NEWT_PROVISIONING_KEY: "${NEWT_PROVISIONING_KEY:-}"
      CONFIG_FILE: /config/newt.json
      # Optional: continuously reconcile a blueprint of this site's resources.
      # Drop a blueprint at ./blueprint.yaml and uncomment:
      # NEWT_BLUEPRINT_FILE: /config/blueprint.yaml
    volumes:
      - ./newt-data:/config
