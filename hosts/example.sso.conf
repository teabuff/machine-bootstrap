# Example SSO config — copy to a private <realm>.sso.conf (gitignored) and fill
# in real values, then:  ./provision-sso.sh hosts/<realm>.sso.conf hosts/<realm>.sso.identity
#
# These are endpoints + credentials only; the declared users/groups live in the
# companion .sso.identity manifest.

# --- Pocket ID (the OIDC provider / identity source of truth) --------------
POCKETID_URL=https://id.example.com
# Must equal STATIC_API_KEY set on the Pocket ID server (>=16 chars). That key
# bypasses the first-run setup wizard, so provisioning is fully headless.
POCKETID_API_KEY=replace-with-static-api-key

# --- Pangolin (the reverse proxy / access gateway, the relying party) ------
# Point at whatever origin reaches Pangolin's dashboard backend. Loopback to
# the container's external port (default 3000) is most reliable for headless runs.
PANGOLIN_URL=http://127.0.0.1:3000
# Public dashboard URL — set as the OIDC client's launchURL so Pocket ID's
# portal shows a clickable tile that opens Pangolin.
PANGOLIN_DASHBOARD_URL=https://pangolin.example.com
PANGOLIN_ADMIN_EMAIL=admin@example.com
PANGOLIN_ADMIN_PASSWORD=replace-with-admin-password
# Optional: docker container name. If set, the script runs
# `pangctl set-admin-credentials` to ensure the server admin exists first.
#PANGOLIN_CONTAINER=pangolin

# --- the link between them --------------------------------------------------
OIDC_CLIENT_ID=pangolin          # deterministic client_id registered in Pocket ID
IDP_NAME=pocket-id               # display name of the IdP created in Pangolin

# Org for SSO users to join. If PANGOLIN_ORG_ID is set, the org is created (if
# absent) and the IdP is mapped into it so every Pocket ID user can log in.
# Leave it unset to skip (users then hit "must be added to an organization").
# Mappings are JMESPath: quote LITERALS ('Member', 'true') — bare words are read
# as claim lookups. This file is sourced as bash, so keep the quotes.
#PANGOLIN_ORG_ID=example-com
#PANGOLIN_ORG_NAME=example.com
# Custom roles to create (Admin + Member are built in); names must match the mapping.
#PANGOLIN_ROLES="Developer Guest"
#IDP_ROLE_MAPPING="contains(groups, 'admins') && 'Admin' || contains(groups, 'developers') && 'Developer' || contains(groups, 'guests') && 'Guest' || ends_with(email, '@example.com') && 'Member' || 'Guest'"
# Must return the org id (or boolean true) to ADMIT — a bare 'true' string admits nobody.
#IDP_ORG_MAPPING="'example-com'"   # admit everyone; domain-gate: ends_with(email,'@example.com') && 'example-com'

# Optional overrides:
#PANGOLIN_CSRF=x-csrf-protection         # static CSRF literal Pangolin expects in prod
#SSO_STATE_FILE=./.sso-state             # where the read-once secret + redirect URL persist
